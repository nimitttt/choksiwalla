<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Choksiwala Jewellers in Barwani and Kukshi." />
  <title>Choksiwala Jewellers | Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="contact">
  <div class="animated-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <div id="siteShell">
    <header class="site-header" data-testid="global-site-header">
      <a href="index.html" class="brand-logo-link" data-testid="header-logo-link" aria-label="Choksiwala Jewellers home">
        <img src="assets/cj-logo.jpg" alt="Choksiwala Jewellers logo" class="brand-logo" data-testid="header-logo-image" />
      </a>
      <div class="header-actions">
        <a href="https://maps.app.goo.gl/mz2p2JyqQ6dCRVYf6" target="_blank" rel="noopener noreferrer" class="icon-button" data-testid="google-maps-link" aria-label="Open store location on Google Maps">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.2c-4.1 0-7.4 3.3-7.4 7.4 0 5.5 7.4 12.2 7.4 12.2s7.4-6.7 7.4-12.2c0-4.1-3.3-7.4-7.4-7.4zm0 10.1c-1.5 0-2.7-1.2-2.7-2.7S10.5 6.9 12 6.9s2.7 1.2 2.7 2.7-1.2 2.7-2.7 2.7z" /></svg>
        </a>
        <button type="button" class="icon-button" id="menuToggle" data-testid="header-menu-toggle-button" aria-label="Open navigation menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
        </button>
      </div>
    </header>

    <main class="page-content" data-testid="contact-page-content">
      <section class="contact-grid" data-testid="contact-two-column-layout">
        <div class="contact-form-card" data-testid="contact-form-card">
          <h1 data-testid="contact-heading">Contact</h1>
          <form id="contactForm" name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" data-testid="contact-netlify-form">
            <input type="hidden" name="form-name" value="contact" />
            <p class="hidden-field">
              <label>Don’t fill this out if you’re human: <input name="bot-field" data-testid="contact-bot-field" /></label>
            </p>

            <label for="name" data-testid="contact-name-label">Name</label>
            <input id="name" name="name" type="text" required data-testid="contact-name-input" />

            <label for="email" data-testid="contact-email-label">Email</label>
            <input id="email" name="email" type="email" required data-testid="contact-email-input" />

            <label for="message" data-testid="contact-message-label">Query / Message</label>
            <textarea id="message" name="message" rows="4" required data-testid="contact-message-input"></textarea>

            <button type="submit" class="send-button" data-testid="contact-send-button">Send</button>
            <p id="formStatus" class="form-status" data-testid="contact-form-status-message" aria-live="polite"></p>
            <p class="form-help-note" data-testid="contact-form-netlify-note">Netlify Forms success confirmation will appear after deploying this site on Netlify.</p>
          </form>
        </div>

        <aside class="contact-info-card" data-testid="contact-info-card">
          <h2 data-testid="contact-info-heading">Contact us on:</h2>
          <p data-testid="contact-location-barwani">Barwani: <a href="tel:+919169162285" data-testid="contact-phone-barwani">+91 91691 62285</a></p>
          <p data-testid="contact-location-kukshi">Kukshi: <a href="tel:+919993993800" data-testid="contact-phone-kukshi">+91 9993993800</a></p>

          <h3 data-testid="contact-social-heading">Reach out to us on:</h3>
          <div class="social-links" data-testid="contact-social-links-wrap">
            <a href="https://www.instagram.com/choksiwalajewellers?igsh=MXhseGpnc204MnFwag==" target="_blank" rel="noopener noreferrer" data-testid="contact-instagram-link" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10c2.8 0 5 2.2 5 5v10c0 2.8-2.2 5-5 5H7c-2.8 0-5-2.2-5-5V7c0-2.8 2.2-5 5-5zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7zm11.2 1.7a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6z" /></svg>
            </a>
            <a href="https://wa.me/919169162285" target="_blank" rel="noopener noreferrer" data-testid="contact-whatsapp-link" aria-label="WhatsApp">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 0 0-8.7 15l-1.2 4.4 4.5-1.2A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.7.7.7-2.6-.2-.3A8 8 0 1 1 12 20zm4.5-6.1c-.2-.1-1.4-.7-1.6-.7-.2-.1-.4-.1-.5.1-.2.2-.6.7-.8.8-.1.2-.3.2-.5.1-.2-.1-.9-.3-1.8-1.1-.7-.6-1.2-1.4-1.3-1.6-.1-.2 0-.3.1-.4l.4-.4c.1-.1.2-.2.2-.4.1-.1.1-.3 0-.4 0-.1-.5-1.3-.7-1.7-.2-.4-.4-.4-.5-.4h-.4c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 1.9 0 1.1.8 2.1.9 2.2.1.2 1.6 2.5 3.9 3.4.5.2 1 .3 1.3.4.5.2 1 .2 1.4.1.4-.1 1.4-.6 1.6-1.1.2-.5.2-1 .2-1.1-.1-.1-.2-.2-.4-.3z" /></svg>
            </a>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div class="menu-overlay" id="menuOverlay" data-testid="global-menu-overlay" aria-hidden="true">
    <nav class="menu-panel" data-testid="global-menu-panel" aria-label="Site navigation">
      <button type="button" id="menuClose" class="menu-close" data-testid="global-menu-close-button" aria-label="Close menu">×</button>
      <a href="index.html" data-testid="menu-link-home">Home</a>
      <a href="gallery.html" data-testid="menu-link-gallery">Gallery</a>
      <a href="disclaimer.html" data-testid="menu-link-disclaimer">Disclaimer</a>
      <a href="privacy.html" data-testid="menu-link-privacy-policy">Privacy Policy</a>
      <a href="contact.html" data-testid="menu-link-contact">Contact</a>
    </nav>
  </div>

  <script src="js/app.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
